version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: daily
      time: "03:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    target-branch: main
    labels:
      - dependabot
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: daily
      time: "03:00"
    cooldown:
      default-days: 7
    target-branch: main
    labels:
      - dependabot
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "04:15"
    cooldown:
      default-days: 7
    target-branch: main
    labels:
      - dependabot
  - package-ecosystem: npm
    directory: "/scripts"
    schedule:
      interval: daily
      time: "03:00"
    cooldown:
      default-days: 7
    target-branch: main
    labels:
      - dependabot
